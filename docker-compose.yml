# ═══════════════════════════════════════════════════════════════════════════════
#  SENTINEL SHIELD - Docker Compose Configuration
#  Multi-container setup for the full stack
#  Author: SENTINEL Team
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  #                              GO API SERVER
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sentinel-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ANALYZER_URL=http://analyzer:5000
      - DECOMPILER_URL=http://decompiler:3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@postgres:5432/${POSTGRES_DB:-sentinel}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-100}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-sentinel-internal-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════════════════════
  #                           RUST DECOMPILER
  # ═══════════════════════════════════════════════════════════════════════════
  decompiler:
    build:
      context: ./decompiler
      dockerfile: Dockerfile
    container_name: sentinel-decompiler
    # Internal only - no external port exposure
    expose:
      - "3000"
    environment:
      - RUST_LOG=info
      - PORT=3000
      - CORS_ORIGINS=http://api:8080
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

  # ═══════════════════════════════════════════════════════════════════════════
  #                           PYTHON ANALYZER
  # ═══════════════════════════════════════════════════════════════════════════
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: sentinel-analyzer
    # Internal only - no external port exposure
    expose:
      - "5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
      - WORKERS=2
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-sentinel-internal-key}
      - CORS_ORIGINS=http://api:8080
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════════════════════
  #                           REACT FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: sentinel-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # ═══════════════════════════════════════════════════════════════════════════
  #                           POSTGRESQL DATABASE
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel}
      - POSTGRES_DB=${POSTGRES_DB:-sentinel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Internal only - not exposed to host in production
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════════════════════
  #                              REDIS CACHE
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-sentinel-redis-pass}
    volumes:
      - redis_data:/data
    # Internal only - not exposed to host in production
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sentinel-redis-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

# ═══════════════════════════════════════════════════════════════════════════════
#                              VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
  redis_data:

# ═══════════════════════════════════════════════════════════════════════════════
#                              NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  sentinel-network:
    driver: bridge
